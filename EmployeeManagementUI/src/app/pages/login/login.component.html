<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>Login</h2>
    </div>

    <div *ngIf="error()"
      class="alert alert-danger mb-4 fade-in px-3 py-2 text-sm rounded bg-danger bg-opacity-10 border border-danger text-light">
      <span class="material-symbols-rounded me-2" style="vertical-align: text-bottom;">warning</span> {{ error() }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="off">
      <div class="mb-4">
        <label class="form-label">Username or Email</label>
        <div class="input-group">
          <span class="input-group-text">
            <span class="material-symbols-rounded" style="font-size: 20px;">person</span>
          </span>
          <input type="text" class="form-control" formControlName="username" placeholder="Who Are You?" autocomplete="new-password">
        </div>
      </div>

      <div class="mb-5">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label mb-0">Password</label>
          <a routerLink="/forgot-password" class="text-primary text-decoration-none"
            style="font-size: 0.8rem; color: #38bdf8 !important;">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text">
            <span class="material-symbols-rounded" style="font-size: 20px;">lock</span>
          </span>
          <input [type]="showPass() ? 'text' : 'password'" class="form-control" formControlName="password"
            placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="input-group-text btn p-0 px-3 m-0" (click)="showPass.set(!showPass())">
            <!-- Visibility icon toggle -->
            <span *ngIf="!showPass()" class="material-symbols-rounded" style="font-size: 20px;">visibility_off</span>
            <span *ngIf="showPass()" class="material-symbols-rounded" style="font-size: 20px;">visibility</span>
          </button>

        </div>
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading()">
        <span *ngIf="loading()" class="spinner-border spinner-border-sm me-2"></span>
        <span>{{ loading() ? 'Authenticating...' : 'Sign In To Workspace' }}</span>
      </button>
    </form>

    <div class="oauth-divider">OR CONTINUE WITH</div>

    <button type="button" class="google-btn" (click)="loginWithGoogle()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
        <path fill="#EA4335"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
        <path fill="#4285F4"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
        <path fill="#FBBC05"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
        <path fill="#34A853"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
        <path fill="none" d="M0 0h48v48H0z" />
      </svg>
      Sign in with Google
    </button>

    <div class="auth-link">
      Need to Register?  <a routerLink="/register">Register here</a>
    </div>
  </div>
</div>
